name: Housekeeping
on:
  # Run every Sunday at 7:00
  schedule:
    - cron: '0 7 * * 6'
  workflow_dispatch:

# for security reasons the github actions are pinned to specific SHAs
jobs:
  chores:
    name: Tidy workflows
    runs-on: ubuntu-24.04
    permissions:
      actions: write

    steps:
      - name: Delete stale workflow runs
        uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7 # v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 28
          keep_minimum_runs: 25

      - name: Delete unused workflow runs
        uses: otto-de/purge-deprecated-workflow-runs@4781dc30eb7236b195e896b9a26b14296341b63a # v4.0.10
        with:
          token: ${{ github.token }}

  link_checker:
    name: Link checker
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout markdown
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Link Checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --verbose --no-progress --max-retries 1 '**/*.md' '*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
